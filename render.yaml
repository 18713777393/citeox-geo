services:
  - type: web
    name: citeox-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build && npx prisma migrate deploy && npm run prisma:seed
    startCommand: npm run start:prod
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://citeox.com,https://www.citeox.com
      - key: APP_URL
        value: https://citeox.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: 平台管理员
