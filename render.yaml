services:
  - type: web
    name: citeox-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build && npx prisma migrate deploy && npm run prisma:seed
    startCommand: npm run start:prod
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://citeox.com,https://www.citeox.com
      - key: APP_URL
        value: https://citeox.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PAYMENT_CALLBACK_BASE
        sync: false
      - key: ALIPAY_APP_ID
        sync: false
      - key: ALIPAY_PRIVATE_KEY
        sync: false
      - key: ALIPAY_PUBLIC_KEY
        sync: false
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_MCH_ID
        sync: false
      - key: WECHAT_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DOUBAO_API_KEY
        sync: false
      - key: TONGYI_API_KEY
        sync: false
      - key: YUANBAO_API_KEY
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: QIANFAN_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: XUNFEI_API_KEY
        sync: false
      - key: AI360_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: 平台管理员
