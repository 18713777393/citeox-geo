services:
  postgres:
    image: postgres:16-alpine
    container_name: zhiyin-geo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
